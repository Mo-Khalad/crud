<html>

<head>
   <meta name="viewport" content="width=device-width,initial-scale=1.0" />
   <link rel="stylesheet" href="css/bootstrap.min.css">
   <link rel="stylesheet" href="css/style.css">
</head>

 <body>
   <h1 class="text-center mt-4 mb-3 fw-bold fs-1">CRUD</h1>
   <div class="container text-light p-5 mb-5 mt-5">
      <div class="form-Inputs">

         <div class="input-gp"> 
            <label>product Name</label>
            <input id="productName" class="form-control mb-3" >
            <div id="nameAlert" class="alert alert-danger d-none" >must be at least 3 chars</div>
         </div>

         <div class="input-gp">
            <label>product Price</label>
            <input id="productPrice" class="form-control mb-3" >
            <div id="priceAlert" class="alert alert-danger d-none" >Enter an amount higher than 99</div>
         </div>

         <div class="input-gp">
            <label>product Category</label>
            <input id="productCategory" class="form-control mb-3" >
            <div id="categoryAlert" class="alert alert-danger d-none" >must be at least 4 chars</div>
         </div>

         <div class="input-gp">
            <label>product Description</label>
            <textarea id="productDescription" class="form-control mb-3" ></textarea>
            <div id="descriptionAlert" class="alert alert-danger d-none" >Must be 4 to 20 characters</div>
         </div>
         <button disabled id="addBtn" class="btn btn-primary mb-3" >add Product</button>

      </div>

      <div class="data mb-5 mt-2">
         <input id="search" class="form-control mb-4" placeholder="search your name">
            <table class="table table-striped">
            <thead>
               <th></th>
               <th>name</th>
               <th>price</th>
               <th>category</th>
               <th>description</th>
               <th></th>
               <th></th>
            </thead>
            <tbody id="tableBody">

            </tbody>
         </table>
      </div>

   </div>
   
<script src="js/main.js"></script>
</body>


</html>
